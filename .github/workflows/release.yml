name: "Release"

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "The version that will be released"
        required: true
      dev_version:
        description: "The next development version"
        required: true
        default: "-SNAPSHOT"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"
          server-id: "central"
          server-username: MAVEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}

      - name: Set up commit signing
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          RELEASE_MAIL: ${{ vars.RELEASE_MAIL }}
        run: |
          git config --global commit.gpgsign true
          git config --global user.signingkey "${GPG_KEY_ID}"
          git config --global user.name 'Sola-ris Releases'
          git config --global user.email "${RELEASE_MAIL}"

      - name: Prepare Release
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSWORD }}
          DEV_VERSION: ${{ github.event.inputs.dev_version }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          ./mvnw -B release:prepare \
            -DreleaseVersion="${RELEASE_VERSION}" \
            -DdevelopmentVersion="${DEV_VERSION}" \
            -Dtag="${RELEASE_VERSION}"

      - name: Perform Release
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: ./mvnw -B release:perform

      - name: Push tag and release commits
        env:
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          git push
          git push origin "${RELEASE_VERSION}"
